services:

  redis:
    image: redis:7-alpine
    container_name: runner-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api_gateway:
    build:
      context: .
      dockerfile: api_gateway/Dockerfile
    container_name: runner-api-gateway
    ports:
      - "8012:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - redis
      - tool_executor
    restart: unless-stopped

  tool_registry:
    build:
      context: .
      dockerfile: tool_registry/Dockerfile
    container_name: runner-tool-registry
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  seeder:
    build:
      context: .
      dockerfile: scripts/Dockerfile.seeder
    container_name: runner-seeder
    depends_on:
      tool_registry:
        condition: service_healthy
    restart: "no"

  tool_executor:
    build:
      context: .
      dockerfile: tool_executor/Dockerfile
    container_name: runner-tool-executor
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - TOOL_REGISTRY_URL=${TOOL_REGISTRY_URL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - tool_registry
    restart: unless-stopped

  tool_curl:
    build:
      context: tools/curl
      dockerfile: Dockerfile
    image: backend_runner-curl
    container_name: runner-tool-curl-builder
    entrypoint: ["echo", "imagen lista"]

  tool_ls:
